<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GymFlow - Giriş Yap</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="css/auth.css">
</head>
<body class="auth-body">

  <div class="auth-container">
    <!-- Left Panel - Branding -->
    <div class="auth-branding">
      <div class="auth-branding-overlay"></div>
      <img src="assets/hero_bg.png" alt="" class="auth-branding-img">
      <div class="auth-branding-content">
        <a href="index.html" class="logo auth-logo">
          <span class="text-gradient">GYM</span>FLOW
        </a>
        <h2>Tekrar Hoş Geldin!</h2>
        <p>Hesabına giriş yap ve antrenman yolculuğuna kaldığın yerden devam et.</p>
        <div class="auth-branding-stats">
          <div class="auth-brand-stat">
            <span>1200+</span>
            <small>Aktif Üye</small>
          </div>
          <div class="auth-brand-stat">
            <span>50+</span>
            <small>Eğitmen</small>
          </div>
          <div class="auth-brand-stat">
            <span>30+</span>
            <small>Ders</small>
          </div>
        </div>
      </div>
    </div>

    <!-- Right Panel - Form -->
    <div class="auth-form-panel">
      <div class="auth-form-wrapper">
        <div class="auth-form-header">
          <h1>Giriş Yap</h1>
          <p>Hesabınıza giriş yaparak devam edin</p>
        </div>

        <form id="loginForm" class="auth-form">
          <div class="form-group">
            <label for="loginEmail">E-posta Adresi</label>
            <div class="input-icon-wrap">
              <span class="input-icon">📧</span>
              <input type="email" id="loginEmail" placeholder="ornek@mail.com" required>
            </div>
          </div>

          <div class="form-group">
            <label for="loginPassword">Şifre</label>
            <div class="input-icon-wrap">
              <span class="input-icon">🔒</span>
              <input type="password" id="loginPassword" placeholder="••••••••" required>
              <button type="button" class="password-toggle" onclick="togglePassword('loginPassword', this)">👁️</button>
            </div>
          </div>

          <div class="form-options">
            <label class="checkbox-label">
              <input type="checkbox" id="rememberMe">
              <span class="checkmark"></span>
              Beni Hatırla
            </label>
            <a href="#" class="forgot-link">Şifremi Unuttum</a>
          </div>

          <button type="submit" class="btn btn-primary btn-lg auth-submit">Giriş Yap</button>

          <div class="auth-divider">
            <span>veya</span>
          </div>

          <button type="button" class="btn btn-social google-btn">
            <span class="social-icon">G</span>
            Google ile Giriş Yap
          </button>

          <div class="auth-footer">
            <p>Henüz hesabınız yok mu? <a href="register.html">Kayıt Ol</a></p>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script src="js/auth.js"></script>
</body>
</html>
