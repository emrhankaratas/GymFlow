<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GymFlow Admin - Dersler</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="css/admin.css">
</head>
<body class="admin-body">

  <!-- Sidebar -->
  <aside class="sidebar glass-panel">
    <div class="logo sidebar-logo">
      <span class="text-gradient">GYM</span>FLOW
    </div>
    <ul class="sidebar-nav">
      <li><a href="admin.html"><span class="nav-icon">📊</span> Dashboard</a></li>
      <li><a href="admin-members.html"><span class="nav-icon">👥</span> Üyeler</a></li>
      <li class="active"><a href="admin-classes.html"><span class="nav-icon">🏋️</span> Dersler</a></li>
      <li><a href="admin-analytics.html"><span class="nav-icon">📈</span> Analitik</a></li>
      <li><a href="admin-settings.html"><span class="nav-icon">⚙️</span> Ayarlar</a></li>
    </ul>
    <div class="sidebar-footer">
      <a href="index.html" class="btn btn-outline sidebar-exit-btn">← Siteye Dön</a>
    </div>
  </aside>

  <!-- Main Content -->
  <main class="main-content">
    <header class="topbar">
      <div>
        <h2>Dersler</h2>
        <p class="topbar-sub">Ders programı ve yönetimi</p>
      </div>
      <div class="user-profile">
        <div class="notif-bell" title="Bildirimler">🔔<span class="notif-badge">3</span></div>
        <div class="avatar">A</div>
        <div class="user-info">
          <span class="user-name">Admin</span>
          <span class="user-role">Yönetici</span>
        </div>
      </div>
    </header>

    <!-- Toolbar -->
    <div class="page-toolbar">
      <h3>Ders Programı Yönetimi</h3>
      <button id="openAddClassModal" class="btn btn-primary">+ Yeni Ders Ekle</button>
    </div>

    <!-- Classes Grid -->
    <div class="classes-admin-grid" id="classesGrid"></div>

    <!-- Schedule Table -->
    <div class="table-section glass-panel" style="margin-top: 30px;">
      <div class="table-header">
        <h3>Haftalık Program Özeti</h3>
      </div>
      <div class="table-responsive">
        <table class="data-table">
          <thead>
            <tr>
              <th>Gün</th><th>Ders</th><th>Eğitmen</th><th>Saat</th><th>Süre</th><th>Doluluk</th>
            </tr>
          </thead>
          <tbody id="scheduleTableBody"></tbody>
        </table>
      </div>
    </div>
  </main>

  <!-- Add Class Modal -->
  <div id="addClassModal" class="modal">
    <div class="modal-content glass-panel">
      <span class="close-modal" data-modal="addClassModal">&times;</span>
      <h2>Yeni Ders Ekle</h2>
      <form id="addClassForm">
        <div class="form-group">
          <label for="className">Ders Adı</label>
          <input type="text" id="className" required placeholder="Örn: Yoga">
        </div>
        <div class="form-group">
          <label for="classTrainer">Eğitmen</label>
          <input type="text" id="classTrainer" required placeholder="Elif Demir">
        </div>
        <div class="form-row-settings">
          <div class="form-group">
            <label for="classDay">Gün</label>
            <select id="classDay" required>
              <option>Pazartesi</option><option>Salı</option><option>Çarşamba</option>
              <option>Perşembe</option><option>Cuma</option><option>Cumartesi</option><option>Pazar</option>
            </select>
          </div>
          <div class="form-group">
            <label for="classTime">Saat</label>
            <input type="time" id="classTime" required value="10:00">
          </div>
        </div>
        <div class="form-row-settings">
          <div class="form-group">
            <label for="classDuration">Süre (dk)</label>
            <input type="number" id="classDuration" required value="60">
          </div>
          <div class="form-group">
            <label for="classCapacity">Kapasite</label>
            <input type="number" id="classCapacity" required value="20">
          </div>
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%; margin-top:10px;">Ders Ekle</button>
      </form>
    </div>
  </div>

  <script src="js/admin.js"></script>
</body>
</html>
